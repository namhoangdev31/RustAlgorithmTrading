x-saas-env: &saas-env
  APP_ENV: ${APP_ENV:-development}
  SERVICE_MODE: managed_saas
  TENANCY_MODE: multi_tenant
  USER_SEGMENTS: developer,trader,regular
  LOG_FORMAT: json

x-rust-env: &rust-env
  <<: *saas-env
  RUST_LOG: ${RUST_LOG:-debug}
  TRADING_ENV: ${TRADING_ENV:-sandbox}
  METRICS_HOST: 0.0.0.0
  ALPACA_API_KEY: ${ALPACA_API_KEY:-}
  ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
  APCA_API_KEY_ID: ${ALPACA_API_KEY:-}
  APCA_API_SECRET_KEY: ${ALPACA_SECRET_KEY:-}

x-rust-service: &rust-service
  restart: unless-stopped
  init: true
  networks:
    - private
  volumes:
    - type: bind
      source: ./config/${TRADING_CONFIG_PROFILE:-system.json}
      target: /workspace/ops/config/system.json
      read_only: true
    - type: bind
      source: ./config/risk_limits.toml
      target: /workspace/ops/config/risk_limits.toml
      read_only: true
  stop_grace_period: 30s
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M
      reservations:
        cpus: '0.05'
        memory: 64M

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - private
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

  market-data:
    <<: *rust-service
    profiles: [ "trading" ]
    image: ${TRADING_IMAGE_REGISTRY:-trading}/market-data:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: market-data
    environment:
      <<: *rust-env
      SERVICE_NAME: market-data
      MARKET_DATA_METRICS_HOST: 0.0.0.0
      HEALTHCHECK_URL: http://127.0.0.1:9091/metrics
    ports:
      - "${MARKET_DATA_PORT:-5555}:5555"
      - "${MARKET_DATA_METRICS_PORT:-9091}:9091"
    labels:
      com.rustalgorithmtrading.role: private-market-data
      com.rustalgorithmtrading.audience: trader

  signal-bridge:
    <<: *rust-service
    profiles: [ "trading" ]
    image: ${TRADING_IMAGE_REGISTRY:-trading}/signal-bridge:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: signal-bridge
    environment:
      <<: *rust-env
      SERVICE_NAME: signal-bridge
      SIGNAL_BRIDGE_METRICS_HOST: 0.0.0.0
      HEALTHCHECK_URL: http://127.0.0.1:9094/metrics
    ports:
      - "${SIGNAL_BRIDGE_PORT:-5556}:5556"
      - "${SIGNAL_BRIDGE_METRICS_PORT:-9094}:9094"
    depends_on:
      market-data:
        condition: service_healthy
    labels:
      com.rustalgorithmtrading.role: private-signal-engine
      com.rustalgorithmtrading.audience: trader

  risk-manager:
    <<: *rust-service
    profiles: [ "trading" ]
    image: ${TRADING_IMAGE_REGISTRY:-trading}/risk-manager:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: risk-manager
    environment:
      <<: *rust-env
      SERVICE_NAME: risk-manager
      RISK_MANAGER_METRICS_HOST: 0.0.0.0
      HEALTHCHECK_URL: http://127.0.0.1:9093/metrics
    ports:
      - "${RISK_MANAGER_METRICS_PORT:-9093}:9093"
    labels:
      com.rustalgorithmtrading.role: private-risk-control
      com.rustalgorithmtrading.audience: trader

  execution-engine:
    <<: *rust-service
    profiles: [ "trading" ]
    image: ${TRADING_IMAGE_REGISTRY:-trading}/execution-engine:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: execution-engine
    environment:
      <<: *rust-env
      SERVICE_NAME: execution-engine
      EXECUTION_ENGINE_METRICS_HOST: 0.0.0.0
      HEALTHCHECK_URL: http://127.0.0.1:9092/metrics
    ports:
      - "${EXECUTION_ENGINE_METRICS_PORT:-9092}:9092"
    depends_on:
      risk-manager:
        condition: service_healthy
      signal-bridge:
        condition: service_healthy
    labels:
      com.rustalgorithmtrading.role: private-order-routing
      com.rustalgorithmtrading.audience: trader

  go-control-plane:
    image: ${TRADING_IMAGE_REGISTRY:-trading}/go-control-plane:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/go.Dockerfile
    restart: unless-stopped
    init: true
    networks:
      - private
    volumes:
      - go-observability-data:/data
    environment:
      <<: *saas-env
      SERVICE_NAME: go-control-plane
      PORT: 8081
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://noah_admin:noah_master@103.82.36.67:8048/noah_db
      DUCKDB_PATH: /data/observability.duckdb
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MARKET_DATA_METRICS_URL: http://market-data:9091/metrics
      EXECUTION_METRICS_URL: http://execution-engine:9092/metrics
      RISK_METRICS_URL: http://risk-manager:9093/metrics
    expose:
      - "8081"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health/ready >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      com.rustalgorithmtrading.role: private-observability-api
      com.rustalgorithmtrading.audience: developer,trader


  nextjs-frontend:
    image: ${TRADING_IMAGE_REGISTRY:-trading}/nextjs-frontend:development
    build:
      context: ..
      dockerfile: ops/deployment/nextjs.Dockerfile
      target: builder
    command: yarn dev
    volumes:
      - ../nextjs:/workspace/nextjs
      - /workspace/nextjs/node_modules
      - /workspace/nextjs/.next
    restart: unless-stopped
    init: true
    networks:
      - public
      - private
    environment:
      <<: *saas-env
      SERVICE_NAME: nextjs-frontend
      NODE_ENV: production
      PORT: 3000
      NODE_OPTIONS: --max-old-space-size=1536
      DATABASE_URL: postgresql://noah_admin:noah_master@103.82.36.67:8048/noah_db
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:-supersecretsecretsecretsecretsecretsecretsecret}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-supersecretsecretsecretsecretsecretsecretsecret}
      APP_SECRETS_MASTER_KEY: ${APP_SECRETS_MASTER_KEY:-masterkeymasterkeymasterkeymasterkey}
      LEPOS_INTERNAL_API_KEY: ${LEPOS_INTERNAL_API_KEY:-internalapikey}
      LEPOS_NATIVE_TELEMETRY_KEY: ${LEPOS_NATIVE_TELEMETRY_KEY:-telemetrykey}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      GITHUB_OAUTH_CALLBACK_URL: ${GITHUB_OAUTH_CALLBACK_URL:-}
      GITHUB_APP_CLIENT_ID: ${GITHUB_APP_CLIENT_ID:-}
      GITHUB_APP_CLIENT_SECRET: ${GITHUB_APP_CLIENT_SECRET:-}
      GITHUB_APP_CALLBACK_URL: ${GITHUB_APP_CALLBACK_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      LEPOS_CACHE_ACCESS_KEY_ID: ${LEPOS_CACHE_ACCESS_KEY_ID:-}
      LEPOS_CACHE_SECRET_ACCESS_KEY: ${LEPOS_CACHE_SECRET_ACCESS_KEY:-}
      LEPOS_CACHE_BUCKET: ${LEPOS_CACHE_BUCKET:-}
      LEPOS_CACHE_ENDPOINT: ${LEPOS_CACHE_ENDPOINT:-}
      LEPOS_CACHE_REGION: ${LEPOS_CACHE_REGION:-us-east-1}
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000)).then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      com.rustalgorithmtrading.role: public-saas-portal
      com.rustalgorithmtrading.audience: developer,trader,regular

  edge-gateway:
    image: ${TRADING_IMAGE_REGISTRY:-trading}/edge-gateway:${IMAGE_TAG:-production}
    build:
      context: ..
      dockerfile: ops/deployment/edge-gateway.Dockerfile
    restart: unless-stopped
    init: true
    networks:
      - public
      - private
    volumes:
      - edge-artifact-data:/var/lib/lepos
    environment:
      <<: *saas-env
      SERVICE_NAME: edge-gateway
      PORT: 8088
      TLS_PORT: 8443
      HOST: 0.0.0.0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LEPOS_STORAGE_ROOT: /var/lib/lepos/artifacts
      LEPOS_CONTROL_PLANE_URL: http://nextjs-frontend:3000
      LEPOS_INTERNAL_API_KEY: ${LEPOS_INTERNAL_API_KEY:-internalapikey}
      LEPOS_SERVICE_ID: ${LEPOS_SERVICE_ID:-edge-gateway}
      LEPOS_SERVICE_SECRET: ${LEPOS_SERVICE_SECRET:-servicesecret}
      LEPOS_IPFS_GATEWAY_URL: ${LEPOS_IPFS_GATEWAY_URL:-https://ipfs.io/ipfs}
      LEPOS_ARWEAVE_GATEWAY_URL: ${LEPOS_ARWEAVE_GATEWAY_URL:-https://arweave.net}
      LEPOS_CONTROL_PLANE_TLS_CERT: ${LEPOS_CONTROL_PLANE_TLS_CERT:-}
      LEPOS_CONTROL_PLANE_TLS_KEY: ${LEPOS_CONTROL_PLANE_TLS_KEY:-}
      LEPOS_CONTROL_PLANE_TLS_CA: ${LEPOS_CONTROL_PLANE_TLS_CA:-}
    ports:
      - "${EDGE_HTTP_PORT:-8088}:8088"
      - "${EDGE_TLS_PORT:-8443}:8443"
    depends_on:
      redis:
        condition: service_healthy
      nextjs-frontend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8088/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      com.rustalgorithmtrading.role: public-edge-gateway
      com.rustalgorithmtrading.audience: developer,trader,regular

networks:
  public:
  private:

volumes:
  go-observability-data:
  edge-artifact-data:
