services:
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  market-data:
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: market-data
    container_name: trading-market-data
    network_mode: host
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - TRADING_ENV=production
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - APCA_API_KEY_ID=${ALPACA_API_KEY}
      - APCA_API_SECRET_KEY=${ALPACA_API_SECRET}
    depends_on:
      - redis

  risk-manager:
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: risk-manager
    container_name: trading-risk-manager
    network_mode: host
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - TRADING_ENV=production
    depends_on:
      - redis

  execution-engine:
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: execution-engine
    container_name: trading-execution-engine
    network_mode: host
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - TRADING_ENV=production
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - APCA_API_KEY_ID=${ALPACA_API_KEY}
      - APCA_API_SECRET_KEY=${ALPACA_API_SECRET}
    depends_on:
      - redis

  signal-bridge:
    build:
      context: ..
      dockerfile: ops/deployment/Dockerfile
      args:
        BIN: signal-bridge
    container_name: trading-signal-bridge
    network_mode: host
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      - TRADING_ENV=production
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET}
      - APCA_API_KEY_ID=${ALPACA_API_KEY}
      - APCA_API_SECRET_KEY=${ALPACA_API_SECRET}
    depends_on:
      - redis

  go-control-plane:
    build:
      context: ..
      dockerfile: ops/deployment/go.Dockerfile
    container_name: trading-go-control-plane
    network_mode: host
    restart: unless-stopped
    volumes:
      - trading-db-data:/data
    environment:
      - PORT=8081
      - HOST=0.0.0.0
      - DUCKDB_PATH=/data/observability.duckdb
    depends_on:
      - redis

  edge-gateway:
    build:
      context: ..
      dockerfile: ops/deployment/edge-gateway.Dockerfile
    container_name: trading-edge-gateway
    network_mode: host
    restart: unless-stopped
    environment:
      - PORT=8088
      - HOST=0.0.0.0
      - REDIS_URL=redis://127.0.0.1:6379
      - LEPOS_STORAGE_ROOT=/workspace
      - LEPOS_CONTROL_PLANE_URL=http://127.0.0.1:8081
      - LEPOS_INTERNAL_API_KEY=lepos_dev_internal_key
      - LEPOS_SERVICE_ID=edge-gateway
      - LEPOS_SERVICE_SECRET=${LEPOS_SERVICE_SECRET:-}
      - LEPOS_IPFS_GATEWAY_URL=https://ipfs.io/ipfs
      - LEPOS_ARWEAVE_GATEWAY_URL=https://arweave.net
    depends_on:
      - redis
      - go-control-plane

volumes:
  trading-db-data:
