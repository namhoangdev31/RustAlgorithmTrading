version: '3.8'

services:
  # Go-native Observability Control Plane (Phase 3.5 Production Standard)
  # This service replaces the legacy Python FastAPI observability server.
  observability-api:
    build:
      context: ../go/observability-api
      dockerfile: Dockerfile
    container_name: tr_observability_go
    ports:
      - "8081:8081"
    environment:
      - DUCKDB_PATH=/data/observability.duckdb
      - LOG_LEVEL=info
      - LISTEN_ADDR=0.0.0.0:8081
      - GIN_MODE=release
    volumes:
      - ../data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trading_network

networks:
  trading_network:
    external: true
    name: trading_network
