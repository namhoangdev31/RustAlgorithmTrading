# Config file for [Air](https://github.com/air-verse/air) in TOML format

# Working directory
root = "."
tmp_dir = "tmp"

[build]
  # Build command
  cmd = "sh -c 'GOGC=20 go build -p 1 -o ./tmp/main ./cmd/server/main.go'"
  # Binary file yielded from cmd
  entrypoint = ["./tmp/main"]
  # Watch these filename extensions.
  include_ext = ["go", "tpl", "html", "tmpl"]
  # Ignore these filename extensions or directories.
  exclude_dir = ["assets", "tmp", "vendor", "docs"]
  # Exclude tests from triggering rebuilds
  exclude_regex = ["_test.go"]
  # Delay after trigger build (ms)
  delay = 1000
  # Stop running old binary when build errors occur.
  stop_on_error = true
  # Send Interrupt signal before killing process.
  send_interrupt = true
  # Delay before sending Kill signal.
  kill_delay = 500

[log]
  time = false
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
